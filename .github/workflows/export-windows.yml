name: Export Windows Desktop

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  GODOT_VERSION: 4.4.1-stable

jobs:
  export-windows:
    name: Build Windows executable
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache Godot download
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/godot
          key: godot-${{ runner.os }}-${{ env.GODOT_VERSION }}

      - name: Install Godot ${{ env.GODOT_VERSION }} Mono and export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          GODOT_DIR_NAME="Godot_v${GODOT_VERSION}_mono_linux_x86_64"
          TEMPLATES_DIR_NAME="Godot_v${GODOT_VERSION}_mono_export_templates"
          GODOT_ZIP="${GODOT_DIR_NAME}.zip"
          TEMPLATES_ZIP="Godot_v${GODOT_VERSION}-stable_mono_export_templates.x86_64.zip"
          mkdir -p "$RUNNER_TEMP/godot"
          curl -L -o "$RUNNER_TEMP/godot.zip" "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_ZIP}"
          curl -L -o "$RUNNER_TEMP/templates.zip" "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${TEMPLATES_ZIP}"
          unzip -q "$RUNNER_TEMP/godot.zip" -d "$RUNNER_TEMP/godot"
          chmod +x "$RUNNER_TEMP/godot/${GODOT_DIR_NAME}/Godot_v${GODOT_VERSION}_mono_linux.x86_64"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono"
          unzip -q "$RUNNER_TEMP/templates.zip" -d "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono"

      - name: Add Godot to PATH
        shell: bash
        run: |
          GODOT_DIR_NAME="Godot_v${GODOT_VERSION}_mono_linux_x86_64"
          echo "$RUNNER_TEMP/godot/${GODOT_DIR_NAME}" >> "$GITHUB_PATH"

      - name: Create Windows export preset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/windows
          cat > export_presets.cfg <<EOF
          [preset-0]
          name="Windows Desktop"
          platform="Windows Desktop"
          runnable=true
          advanced_options=false
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/windows/Roguelitussy.exe"
          encryption_include_filters=""
          encryption_exclude_filters=""
          seed=0
          encrypt_pck=false
          encrypt_directory=false
          script_export_mode=2

          [preset-0-options]
          custom_template/debug=""
          custom_template/release=""
          debug/export_console_wrapper=1
          binary_format/embed_pck=false
          texture_format/s3tc_bptc=true
          texture_format/etc2_astc=false
          binary_format/architecture="x86_64"
          codesign/enable=false
          application/modify_resources=false
          application/icon=""
          application/console_wrapper_icon=""
          application/icon_interpolation=4
          application/file_version=""
          application/product_version=""
          application/company_name=""
          application/product_name="Roguelitussy"
          application/file_description=""
          application/copyright=""
          application/trademarks=""
          application/export_angle=0
          ssh_remote_deploy/enabled=false
          texture_format/bptc=true
          texture_format/etc=true
          texture_format/s3tc=true
          EOF

      - name: Export Windows binary
        shell: bash
        run: |
          set -euo pipefail
          Godot_v${GODOT_VERSION}_mono_linux.x86_64 --headless --path . --export-release "Windows Desktop" build/windows/Roguelitussy.exe

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: roguelitussy-windows
          path: build/windows/
          if-no-files-found: error

name: Export Windows Desktop

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  GODOT_VERSION: 4.5.2-stable

jobs:
  export-windows:
    name: Build Windows executable
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache Godot download
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/godot
          key: godot-bin-${{ runner.os }}-${{ env.GODOT_VERSION }}

      - name: Install Godot ${{ env.GODOT_VERSION }} Mono
        if: steps.cache-godot.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          GODOT_DIR_NAME="Godot_v${GODOT_VERSION}_mono_linux_x86_64"
          GODOT_ZIP="${GODOT_DIR_NAME}.zip"
          mkdir -p "$RUNNER_TEMP/godot"
          curl -L -o "$RUNNER_TEMP/godot.zip" "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_ZIP}"
          unzip -q "$RUNNER_TEMP/godot.zip" -d "$RUNNER_TEMP/godot"
          chmod +x "$RUNNER_TEMP/godot/${GODOT_DIR_NAME}/Godot_v${GODOT_VERSION}_mono_linux.x86_64"

      - name: Install Godot ${{ env.GODOT_VERSION }} Mono export templates
        shell: bash
        run: |
          set -euo pipefail
          TEMPLATES_TPZ="Godot_v${GODOT_VERSION}_mono_export_templates.tpz"
          GODOT_TEMPLATE_VERSION="${GODOT_VERSION%-stable}.stable.mono"
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          mkdir -p "$TEMPLATES_DIR"
          curl -L -o "$RUNNER_TEMP/templates.tpz" "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${TEMPLATES_TPZ}"
          rm -rf "$RUNNER_TEMP/templates"
          unzip -q "$RUNNER_TEMP/templates.tpz" -d "$RUNNER_TEMP/templates"
          cp -r "$RUNNER_TEMP/templates/templates/"* "$TEMPLATES_DIR/"
          ls -la "$TEMPLATES_DIR/"
          # Also place templates next to the Godot binary for portable lookup
          GODOT_DIR_NAME="Godot_v${GODOT_VERSION}_mono_linux_x86_64"
          PORTABLE_DIR="$RUNNER_TEMP/godot/${GODOT_DIR_NAME}/export_templates/${GODOT_TEMPLATE_VERSION}"
          mkdir -p "$PORTABLE_DIR"
          cp -r "$RUNNER_TEMP/templates/templates/"* "$PORTABLE_DIR/"

      - name: Add Godot and .NET to PATH
        shell: bash
        run: |
          GODOT_DIR_NAME="Godot_v${GODOT_VERSION}_mono_linux_x86_64"
          echo "$RUNNER_TEMP/godot/${GODOT_DIR_NAME}" >> "$GITHUB_PATH"
          echo "$DOTNET_ROOT" >> "$GITHUB_PATH"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"

      - name: Create Windows export preset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/windows
          TEMPLATES_DIR="$RUNNER_TEMP/templates/templates"
          {
            echo '[preset.0]'
            echo ''
            echo 'name="Windows Desktop"'
            echo 'platform="Windows Desktop"'
            echo 'runnable=true'
            echo 'advanced_options=false'
            echo 'dedicated_server=false'
            echo 'custom_features=""'
            echo 'export_filter="all_resources"'
            echo 'include_filter=""'
            echo 'exclude_filter=""'
            echo 'export_path="build/windows/Roguelitussy.exe"'
            echo 'encryption_include_filters=""'
            echo 'encryption_exclude_filters=""'
            echo 'seed=0'
            echo 'encrypt_pck=false'
            echo 'encrypt_directory=false'
            echo 'script_export_mode=2'
            echo ''
            echo '[preset.0.options]'
            echo ''
            echo "custom_template/debug=\"$TEMPLATES_DIR/windows_debug_x86_64.exe\""
            echo "custom_template/release=\"$TEMPLATES_DIR/windows_release_x86_64.exe\""
            echo 'debug/export_console_wrapper=1'
            echo 'binary_format/embed_pck=false'
            echo 'texture_format/s3tc_bptc=true'
            echo 'texture_format/etc2_astc=false'
            echo 'binary_format/architecture="x86_64"'
            echo 'codesign/enable=false'
            echo 'application/modify_resources=false'
            echo 'application/icon=""'
            echo 'application/console_wrapper_icon=""'
            echo 'application/icon_interpolation=4'
            echo 'application/file_version=""'
            echo 'application/product_version=""'
            echo 'application/company_name=""'
            echo 'application/product_name="Roguelitussy"'
            echo 'application/file_description=""'
            echo 'application/copyright=""'
            echo 'application/trademarks=""'
            echo 'application/export_angle=0'
            echo 'ssh_remote_deploy/enabled=false'
            echo 'texture_format/bptc=true'
            echo 'texture_format/etc=true'
            echo 'texture_format/s3tc=true'
          } > export_presets.cfg

      - name: Build C# solutions
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .godot/mono/temp/bin .godot/mono/temp/obj bin obj
          Godot_v${GODOT_VERSION}_mono_linux.x86_64 --headless --build-solutions --quit --path .

      - name: Export Windows binary
        shell: bash
        run: |
          set -euo pipefail
          Godot_v${GODOT_VERSION}_mono_linux.x86_64 --headless --export-release "Windows Desktop" build/windows/Roguelitussy.exe --path .

      - name: Validate C# export payload
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path("build/windows")
          data_dirs = list(root.glob("data_*_windows_x86_64"))
          if not data_dirs:
              raise SystemExit("Missing Godot C# data directory in Windows export")

          data_dir = data_dirs[0]
          required = [
              root / "Roguelitussy.exe",
              root / "Roguelitussy.pck",
              data_dir / "godotussy.dll",
              data_dir / "godotussy.deps.json",
              data_dir / "hostfxr.dll",
              data_dir / "hostpolicy.dll",
              data_dir / "coreclr.dll",
          ]
          missing = [str(path) for path in required if not path.exists()]
          if missing:
              raise SystemExit("Missing Windows export files: " + ", ".join(missing))

          deps = json.loads((data_dir / "godotussy.deps.json").read_text())
          if "GodotSharp" not in json.dumps(deps):
              raise SystemExit("godotussy.deps.json does not reference GodotSharp")

          if b"GodotPlugins" not in (data_dir / "godotussy.dll").read_bytes():
              raise SystemExit("godotussy.dll does not contain generated GodotPlugins glue")
          PY

      - name: Package Windows build
        shell: bash
        run: |
          set -euo pipefail
          cat > build/windows/README.txt <<'EOF'
          Run Roguelitussy.exe from this extracted folder.

          Keep Roguelitussy.exe, Roguelitussy.pck, and the data_godotussy_windows_x86_64 folder together.
          The game is a Godot C# export and will close at startup if the data folder is missing.

          If the game closes after the splash screen, run Run_With_Logs.bat instead.
          It writes roguelitussy.log, roguelitussy.stdout.log, and roguelitussy.stderr.log next to the executable.
          EOF
          cat > build/windows/Run_With_Logs.bat <<'EOF'
          @echo off
          setlocal
          cd /d "%~dp0"
          echo Starting Roguelitussy with verbose logging...
          echo Working directory: %CD%
          echo.
          echo Logs will be written to:
          echo   %CD%\roguelitussy.log
          echo   %CD%\roguelitussy.stdout.log
          echo   %CD%\roguelitussy.stderr.log
          echo.
          "Roguelitussy.exe" --verbose --log-file "%CD%\roguelitussy.log" > "%CD%\roguelitussy.stdout.log" 2> "%CD%\roguelitussy.stderr.log"
          set EXITCODE=%ERRORLEVEL%
          echo.
          echo Roguelitussy exited with code %EXITCODE%.
          echo.
          echo Last lines from stdout log:
          powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Test-Path 'roguelitussy.stdout.log') { Get-Content 'roguelitussy.stdout.log' -Tail 40 }"
          echo.
          echo Last lines from stderr log:
          powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Test-Path 'roguelitussy.stderr.log') { Get-Content 'roguelitussy.stderr.log' -Tail 40 }"
          echo.
          echo Paste roguelitussy.log, roguelitussy.stdout.log, and roguelitussy.stderr.log if the issue persists.
          pause
          exit /b %EXITCODE%
          EOF
          (cd build/windows && zip -r ../roguelitussy-windows.zip .)

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: roguelitussy-windows
          path: build/roguelitussy-windows.zip
          if-no-files-found: error

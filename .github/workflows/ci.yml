name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

env:
  GODOT_VERSION: 4.5.2-stable

jobs:
  dotnet-validation:
    name: .NET 8 stub build and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore solution
        run: dotnet restore godotussy.sln -p:UseGodotStubs=true

      - name: Validate JSON syntax
        shell: bash
        run: |
          set -euo pipefail
          find Content -name "*.json" -exec python3 -m json.tool {} \; > /dev/null

      - name: Verify formatting
        run: dotnet format --verify-no-changes godotussy.sln

      - name: Build Godot stub profile
        run: dotnet build godotussy.csproj -p:UseGodotStubs=true -p:RoguelitussyWarningsAsErrors=true --no-restore

      - name: Build test project
        run: dotnet build Tests/godotussy.Tests.csproj -p:RoguelitussyWarningsAsErrors=true --no-restore

      - name: Run full custom test harness
        run: dotnet run --project Tests/godotussy.Tests.csproj --no-build

      - name: Restore rendering validation profile
        run: dotnet restore Tests/godotussy.Tests.csproj -p:UseGodotStubs=true -p:RenderingValidation=true

      - name: Run rendering validation profile
        run: dotnet run --project Tests/godotussy.Tests.csproj -p:UseGodotStubs=true -p:RenderingValidation=true -p:RoguelitussyWarningsAsErrors=true

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-build-artifacts
          path: |
            bin/
            obj/
            Tests/bin/
            Tests/obj/
          if-no-files-found: ignore

  godot-headless:
    name: Godot 4.5.2 Mono headless import and startup
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache Godot download
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/godot
          key: godot-${{ runner.os }}-${{ env.GODOT_VERSION }}

      - name: Install Godot ${{ env.GODOT_VERSION }} Mono
        if: steps.cache-godot.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          GODOT_DIR_NAME="Godot_v${GODOT_VERSION}_mono_linux_x86_64"
          GODOT_ZIP="${GODOT_DIR_NAME}.zip"
          mkdir -p "$RUNNER_TEMP/godot"
          curl -L -o "$RUNNER_TEMP/godot.zip" "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_ZIP}"
          unzip -q "$RUNNER_TEMP/godot.zip" -d "$RUNNER_TEMP/godot"
          chmod +x "$RUNNER_TEMP/godot/${GODOT_DIR_NAME}/Godot_v${GODOT_VERSION}_mono_linux.x86_64"

      - name: Add Godot to PATH
        shell: bash
        run: |
          GODOT_DIR_NAME="Godot_v${GODOT_VERSION}_mono_linux_x86_64"
          echo "$RUNNER_TEMP/godot/${GODOT_DIR_NAME}" >> "$GITHUB_PATH"

      - name: Godot editor import
        shell: bash
        run: timeout 180s Godot_v${GODOT_VERSION}_mono_linux.x86_64 --headless --editor --path . --quit

      - name: Godot startup smoke
        shell: bash
        run: timeout 120s Godot_v${GODOT_VERSION}_mono_linux.x86_64 --headless --path . --quit

      - name: Upload Godot artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: godot-headless-artifacts
          path: |
            .godot/
          if-no-files-found: ignore
